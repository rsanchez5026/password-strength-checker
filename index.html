<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Password Strength Checker</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <main class="card">
    <h1>Password Strength Checker</h1>
    <p class="sub">Type a password to see its strength in real time.</p>

    <div class="field-wrap">
      <input
        id="password"
        type="password"
        autocomplete="new-password"
        placeholder="Enter your password"
        aria-label="Password input"
      />
      <button
        type="button"
        class="toggle-password"
        id="togglePassword"
        aria-label="Show password"
        aria-pressed="false"
      >
        <span class="toggle-icon" id="toggleIcon" aria-hidden="true">Show</span>
      </button>
    </div>

    <section class="meter" aria-live="polite">
      <div class="meter-track">
        <div class="meter-fill" id="meterFill"></div>
      </div>
      <div class="strength-row">
        <span class="strength-label">Strength</span>
        <span class="strength-value" id="strengthText">Weak</span>
      </div>
    </section>

    <ul class="requirements" id="requirementsList">
      <li data-rule="length">
        <span class="icon">•</span>
        <span>At least 8 characters</span>
      </li>
      <li data-rule="upper">
        <span class="icon">•</span>
        <span>Contains an uppercase letter</span>
      </li>
      <li data-rule="lower">
        <span class="icon">•</span>
        <span>Contains a lowercase letter</span>
      </li>
      <li data-rule="number">
        <span class="icon">•</span>
        <span>Contains a number</span>
      </li>
      <li data-rule="special">
        <span class="icon">•</span>
        <span>Contains a special character</span>
      </li>
    </ul>
  </main>

  <script src="script.js?v=3"></script>
</body>
</html>
